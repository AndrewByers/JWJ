<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Jack Walker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #16a34a; /* Professional Green */
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .profile-photo {
            width: 100%;          /* Allows it to scale naturally up to max-width */
            max-width: 180px;     /* Sets a clean size for a logo banner */
            height: auto;         /* Prevents stretching */
            margin-bottom: 20px;
            object-fit: contain;
            
    /* Removed the border-radius circle and background shadows for a clean look */
       }
        h1 {
            font-size: 1.5rem;
            margin: 0 0 8px 0;
            font-weight: 600;
        }

        .title {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 16px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
        }

        .btn-secondary {
            background-color: #f1f5f9;
            color: var(--text-color);
            border: 1px solid #e2e8f0;
        }

        .btn:active {
            transform: scale(0.98);
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="profile.jpg" alt="Jack Walker" class="profile-photo">
        
        <h1>Jack Walker</h1>
        <p class="title">Joiner</p>

        <div class="button-stack">
            <a href="contact.vcf" class="btn btn-primary">Save to Contacts</a>
            
            <!-- SMS Button: Replace with your mobile number -->
            <a href="sms:+447875391665?&body=Hi%20Jack%2C%20we%20just%20met%20via%20your%20NFC%20card!%20I%27d%20love%20to%20chat%20about..." class="btn btn-success">Send me a text</a>

            <a href="https://linkedin.com/in/jack-walker-507b873ab" class="btn btn-secondary">LinkedIn Profile</a>
            <a href="http://bdb15.com" class="btn btn-secondary">Personal Website</a>
        </div>

        <footer>
            Tap to connect with Jack
        </footer>
    </div>

</body>
</html>
